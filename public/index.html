<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoggTrack</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }

    /* --- NAV --- */
    .nav {
      display: flex;
      justify-content: center;
      gap: 0;
      background: #16213e;
      border-bottom: 2px solid #e94560;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav button {
      flex: 1;
      max-width: 200px;
      padding: 14px 0;
      background: transparent;
      color: #888;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border-bottom: 3px solid transparent;
    }
    .nav button.active {
      color: #e94560;
      border-bottom-color: #e94560;
    }

    .page { display: none; padding: 24px 16px; max-width: 700px; margin: 0 auto; }
    .page.active { display: block; }

    h2 { text-align: center; color: #e94560; margin-bottom: 20px; font-size: 1.5rem; }

    /* --- CALENDAR --- */
    .week-nav { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px; }
    .week-nav button { background: #533483; color: #fff; border: none; border-radius: 8px; padding: 10px 16px; cursor: pointer; font-size: 1rem; font-weight: 600; }
    .week-nav button:hover { background: #e94560; }
    .week-nav span { font-size: 1rem; color: #ccc; min-width: 220px; text-align: center; }

    .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 24px; }
    .day-header { text-align: center; font-size: 0.75rem; color: #888; padding: 4px 0; }
    .day-cell {
      background: #16213e;
      border-radius: 8px;
      min-height: 70px;
      padding: 6px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s;
      position: relative;
    }
    .day-cell:hover { border-color: #533483; }
    .day-cell.today { border-color: #e94560; }
    .day-cell .day-num { font-size: 0.8rem; color: #888; margin-bottom: 4px; }
    .day-cell .session-dot {
      background: #e94560;
      color: #fff;
      font-size: 0.65rem;
      padding: 2px 5px;
      border-radius: 4px;
      display: inline-block;
      margin-top: 2px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* --- MODAL --- */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
      overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #16213e;
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 550px;
      animation: fadeIn 0.25s ease;
    }
    .modal h3 { color: #e94560; margin-bottom: 16px; }
    .form-row { margin-bottom: 12px; }
    .form-row label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 4px; }
    .form-row input, .form-row select {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #1a1a2e;
      border-radius: 8px;
      background: #1a1a2e;
      color: #eee;
      font-size: 1rem;
      outline: none;
    }
    .form-row input:focus { border-color: #e94560; }

    .exercise-block {
      background: #1a1a2e;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .exercise-block .exo-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .exercise-block .exo-header input { flex: 1; margin-right: 8px; }
    .sets-table { width: 100%; font-size: 0.9rem; }
    .sets-table th { color: #888; font-weight: 500; text-align: left; padding: 2px 4px; }
    .sets-table td { padding: 2px 4px; }
    .sets-table input { width: 70px; padding: 6px 8px; text-align: center; }

    .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: background 0.2s; }
    .btn-primary { background: #e94560; color: #fff; }
    .btn-primary:hover { background: #c73e54; }
    .btn-secondary { background: #533483; color: #fff; }
    .btn-secondary:hover { background: #6b44a0; }
    .btn-danger { background: #c0392b; color: #fff; }
    .btn-danger:hover { background: #e74c3c; }
    .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
    .btn-row { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }

    /* --- TOP PERF --- */
    .perf-card {
      background: #16213e;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: border-color 0.2s;
      border: 2px solid transparent;
    }
    .perf-card:hover { border-color: #e94560; }
    .perf-exo { font-size: 1.1rem; font-weight: 600; }
    .perf-value { color: #e94560; font-size: 1.2rem; font-weight: 700; }
    .perf-detail { font-size: 0.8rem; color: #888; margin-top: 4px; }

    /* --- SESSION DETAIL --- */
    .session-detail-exo { background: #1a1a2e; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
    .session-detail-exo h4 { color: #e94560; margin-bottom: 8px; }
    .session-detail-exo table { width: 100%; font-size: 0.9rem; }
    .session-detail-exo th { color: #888; text-align: left; padding: 4px 8px; }
    .session-detail-exo td { padding: 4px 8px; }

    .empty { text-align: center; color: #888; margin-top: 32px; font-size: 1rem; }

    /* --- REST TIMER --- */
    .timer-container { display: flex; flex-direction: column; align-items: center; gap: 24px; padding-top: 20px; }
    .timer-circle {
      width: 220px; height: 220px;
      border-radius: 50%;
      border: 6px solid #16213e;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .timer-circle svg {
      position: absolute; top: -6px; left: -6px;
      width: 232px; height: 232px;
      transform: rotate(-90deg);
    }
    .timer-circle svg circle {
      fill: none; stroke-width: 6; stroke-linecap: round;
    }
    .timer-circle .bg { stroke: #16213e; }
    .timer-circle .progress { stroke: #e94560; transition: stroke-dashoffset 0.3s linear; }
    .timer-display { font-size: 3.5rem; font-weight: 700; color: #e94560; z-index: 1; }
    .timer-presets { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .timer-presets button {
      background: #16213e; color: #ccc; border: 2px solid #533483;
      border-radius: 20px; padding: 8px 18px; font-size: 0.95rem; cursor: pointer; font-weight: 600;
    }
    .timer-presets button.selected { background: #533483; color: #fff; border-color: #e94560; }
    .timer-presets button:hover { border-color: #e94560; }
    .timer-controls { display: flex; gap: 12px; }
    .timer-controls button { min-width: 110px; font-size: 1.1rem; padding: 14px 24px; }
    .timer-custom { display: flex; align-items: center; gap: 8px; }
    .timer-custom input {
      width: 80px; padding: 10px; text-align: center;
      border: 2px solid #16213e; border-radius: 8px;
      background: #16213e; color: #eee; font-size: 1.1rem; outline: none;
    }
    .timer-custom input:focus { border-color: #e94560; }
    .timer-custom span { color: #888; font-size: 0.9rem; }

    /* --- SAVED REST TIMES --- */
    .saved-rest { margin-top: 28px; width: 100%; }
    .saved-rest h3 { color: #e94560; margin-bottom: 12px; font-size: 1.1rem; text-align: center; }
    .saved-rest-form { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .saved-rest-form input { flex: 1; min-width: 100px; padding: 10px 12px; border: 2px solid #1a1a2e; border-radius: 8px; background: #1a1a2e; color: #eee; font-size: 0.95rem; outline: none; }
    .saved-rest-form input:focus { border-color: #e94560; }
    .saved-rest-item {
      display: flex; justify-content: space-between; align-items: center;
      background: #16213e; border-radius: 8px; padding: 12px 14px; margin-bottom: 6px;
      cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s;
    }
    .saved-rest-item:hover { border-color: #533483; }
    .saved-rest-item .sr-name { font-weight: 600; }
    .saved-rest-item .sr-time { color: #e94560; font-weight: 700; margin: 0 12px; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- NAVIGATION -->
  <div class="nav">
    <button class="active" data-page="calendar">📅 Calendrier</button>
    <button data-page="topperf">🏆 Top Perf</button>
    <button data-page="timer">⏱️ Repos</button>
    <button data-page="tasks">📝 Tâches</button>
  </div>

  <!-- PAGE: CALENDRIER -->
  <div class="page active" id="page-calendar">
    <h2>Mes Séances</h2>
    <div class="week-nav">
      <button id="prevWeek">◀</button>
      <span id="weekLabel"></span>
      <button id="nextWeek">▶</button>
    </div>
    <div class="week-grid">
      <div class="day-header">Lun</div><div class="day-header">Mar</div><div class="day-header">Mer</div>
      <div class="day-header">Jeu</div><div class="day-header">Ven</div><div class="day-header">Sam</div><div class="day-header">Dim</div>
      <div class="day-cell" id="d0"></div><div class="day-cell" id="d1"></div><div class="day-cell" id="d2"></div>
      <div class="day-cell" id="d3"></div><div class="day-cell" id="d4"></div><div class="day-cell" id="d5"></div><div class="day-cell" id="d6"></div>
    </div>
    <div style="text-align:center;">
      <button class="btn btn-primary" id="addSessionBtn">+ Nouvelle Séance</button>
    </div>
  </div>

  <!-- PAGE: TOP PERF -->
  <div class="page" id="page-topperf">
    <h2>🏆 Meilleures Performances</h2>
    <div id="perfList"></div>
    <p class="empty" id="perfEmpty">Aucune perf enregistrée. Ajoute des séances !</p>
  </div>

  <!-- PAGE: TIMER REPOS -->
  <div class="page" id="page-timer">
    <h2>⏱️ Temps de Repos</h2>
    <div class="timer-container">
      <div class="timer-circle">
        <svg viewBox="0 0 232 232">
          <circle class="bg" cx="116" cy="116" r="110"/>
          <circle class="progress" id="timerProgress" cx="116" cy="116" r="110"/>
        </svg>
        <div class="timer-display" id="timerDisplay">1:30</div>
      </div>
      <div class="timer-presets">
        <button data-time="30">30s</button>
        <button data-time="60">1 min</button>
        <button class="selected" data-time="90">1:30</button>
        <button data-time="120">2 min</button>
        <button data-time="180">3 min</button>
        <button data-time="300">5 min</button>
      </div>
      <div class="timer-custom">
        <input type="number" id="customTime" placeholder="sec" min="1" max="3600">
        <span>secondes</span>
        <button class="btn btn-secondary btn-sm" id="setCustomTime">OK</button>
      </div>
      <div class="timer-controls">
        <button class="btn btn-primary" id="timerStartBtn">Démarrer</button>
        <button class="btn btn-secondary" id="timerResetBtn">Reset</button>
      </div>
      <div class="saved-rest">
        <h3>💾 Mes temps de repos enregistrés</h3>
        <div class="saved-rest-form">
          <input type="text" id="srName" placeholder="Exercice (ex: Squat)" maxlength="100">
          <input type="number" id="srTime" placeholder="Secondes" min="1" max="3600" style="max-width:100px;">
          <button class="btn btn-primary btn-sm" id="srAddBtn">Ajouter</button>
        </div>
        <div id="savedRestList"></div>
        <p class="empty" id="srEmpty" style="margin-top:12px;">Aucun temps enregistré</p>
      </div>
    </div>
  </div>

  <!-- PAGE: TÂCHES -->
  <div class="page" id="page-tasks">
    <h2>📝 Tâches</h2>
    <div style="display:flex;gap:8px;margin-bottom:24px;">
      <input type="text" id="taskInput" placeholder="Nouvelle tâche..." maxlength="500" style="flex:1;padding:12px 16px;border:2px solid #16213e;border-radius:8px;background:#16213e;color:#eee;font-size:1rem;outline:none;">
      <button class="btn btn-primary" id="addTaskBtn">Ajouter</button>
    </div>
    <ul id="taskList" style="list-style:none;"></ul>
    <p class="empty" id="taskEmpty">Aucune tâche pour le moment !</p>
  </div>

  <!-- MODAL: Créer/Éditer séance -->
  <div class="modal-overlay" id="sessionModal">
    <div class="modal">
      <h3 id="modalTitle">Nouvelle Séance</h3>
      <div class="form-row">
        <label>Date</label>
        <input type="date" id="sessionDate">
      </div>
      <div class="form-row">
        <label>Nom de la séance</label>
        <input type="text" id="sessionName" placeholder="Ex: Push, Pull, Legs..." maxlength="200">
      </div>
      <h4 style="color:#aaa;margin:16px 0 8px;">Exercices</h4>
      <div id="exerciseList"></div>
      <button class="btn btn-secondary btn-sm" id="addExoBtn" style="margin-bottom:12px;">+ Exercice</button>
      <div class="btn-row">
        <button class="btn btn-primary" id="saveSessionBtn">Sauvegarder</button>
        <button class="btn btn-danger" id="deleteSessionBtn" style="display:none;">Supprimer</button>
        <button class="btn btn-secondary" id="closeModalBtn">Annuler</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Détail séance (depuis Top Perf) -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal">
      <h3 id="detailTitle"></h3>
      <p id="detailDate" style="color:#888;margin-bottom:16px;"></p>
      <div id="detailExercises"></div>
      <div class="btn-row">
        <button class="btn btn-secondary" id="closeDetailBtn">Fermer</button>
      </div>
    </div>
  </div>

  <script>
    // --- STATE ---
    let sessions = [];
    let currentWeekStart = getMonday(new Date());
    let editingSessionId = null;

    // --- NAV ---
    document.querySelectorAll('.nav button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + btn.dataset.page).classList.add('active');
        if (btn.dataset.page === 'topperf') loadPerfs();
      });
    });

    // --- UTILS ---
    function getMonday(d) {
      const date = new Date(d);
      const day = date.getDay();
      const diff = date.getDate() - day + (day === 0 ? -6 : 1);
      date.setDate(diff);
      date.setHours(0,0,0,0);
      return date;
    }

    function formatDate(d) {
      return d.toISOString().slice(0, 10);
    }

    function frDate(str) {
      const [y, m, d] = str.split('-');
      return `${d}/${m}/${y}`;
    }

    function frDateRange(start) {
      const end = new Date(start);
      end.setDate(end.getDate() + 6);
      const opts = { day: 'numeric', month: 'short' };
      return `${start.toLocaleDateString('fr-FR', opts)} — ${end.toLocaleDateString('fr-FR', opts)} ${end.getFullYear()}`;
    }

    // --- CALENDAR ---
    function renderWeek() {
      document.getElementById('weekLabel').textContent = frDateRange(currentWeekStart);
      const today = formatDate(new Date());
      for (let i = 0; i < 7; i++) {
        const cell = document.getElementById('d' + i);
        const d = new Date(currentWeekStart);
        d.setDate(d.getDate() + i);
        const dateStr = formatDate(d);
        cell.className = 'day-cell' + (dateStr === today ? ' today' : '');
        cell.dataset.date = dateStr;
        const daySessions = sessions.filter(s => s.date === dateStr);
        cell.innerHTML = `<div class="day-num">${d.getDate()}</div>`;
        daySessions.forEach(s => {
          cell.innerHTML += `<div class="session-dot" data-id="${s.id}">${s.name}</div>`;
        });
        cell.onclick = (e) => {
          const dot = e.target.closest('.session-dot');
          if (dot) {
            openEditSession(dot.dataset.id);
          } else {
            openNewSession(dateStr);
          }
        };
      }
    }

    document.getElementById('prevWeek').onclick = () => {
      currentWeekStart.setDate(currentWeekStart.getDate() - 7);
      renderWeek();
    };
    document.getElementById('nextWeek').onclick = () => {
      currentWeekStart.setDate(currentWeekStart.getDate() + 7);
      renderWeek();
    };

    // --- SESSION MODAL ---
    function openNewSession(date) {
      editingSessionId = null;
      document.getElementById('modalTitle').textContent = 'Nouvelle Séance';
      document.getElementById('sessionDate').value = date || formatDate(new Date());
      document.getElementById('sessionName').value = '';
      document.getElementById('exerciseList').innerHTML = '';
      document.getElementById('deleteSessionBtn').style.display = 'none';
      addExerciseBlock();
      document.getElementById('sessionModal').classList.add('open');
    }

    function openEditSession(id) {
      const session = sessions.find(s => s.id === id);
      if (!session) return;
      editingSessionId = id;
      document.getElementById('modalTitle').textContent = 'Modifier la Séance';
      document.getElementById('sessionDate').value = session.date;
      document.getElementById('sessionName').value = session.name;
      document.getElementById('exerciseList').innerHTML = '';
      document.getElementById('deleteSessionBtn').style.display = 'inline-block';
      session.exercises.forEach(ex => addExerciseBlock(ex));
      document.getElementById('sessionModal').classList.add('open');
    }

    document.getElementById('addSessionBtn').onclick = () => openNewSession();
    document.getElementById('closeModalBtn').onclick = () => document.getElementById('sessionModal').classList.remove('open');

    function addExerciseBlock(ex) {
      const div = document.createElement('div');
      div.className = 'exercise-block';
      const sets = ex ? ex.sets : [{ reps: '', weight: '' }];
      div.innerHTML = `
        <div class="exo-header">
          <input type="text" class="exo-name" placeholder="Nom de l'exercice" value="${ex ? ex.name : ''}" maxlength="200">
          <button class="btn btn-danger btn-sm remove-exo">✕</button>
        </div>
        <table class="sets-table">
          <thead><tr><th>Série</th><th>Reps</th><th>Poids (kg)</th><th></th></tr></thead>
          <tbody>${sets.map((s, i) => `
            <tr>
              <td>${i + 1}</td>
              <td><input type="number" class="set-reps" value="${s.reps}" min="0" max="9999"></td>
              <td><input type="number" class="set-weight" value="${s.weight}" min="0" max="9999" step="0.5"></td>
              <td><button class="btn btn-danger btn-sm remove-set">✕</button></td>
            </tr>`).join('')}
          </tbody>
        </table>
        <button class="btn btn-secondary btn-sm add-set" style="margin-top:6px;">+ Série</button>
      `;
      div.querySelector('.remove-exo').onclick = () => div.remove();
      div.querySelector('.add-set').onclick = () => {
        const tbody = div.querySelector('tbody');
        const idx = tbody.rows.length + 1;
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${idx}</td><td><input type="number" class="set-reps" min="0" max="9999"></td><td><input type="number" class="set-weight" min="0" max="9999" step="0.5"></td><td><button class="btn btn-danger btn-sm remove-set">✕</button></td>`;
        tr.querySelector('.remove-set').onclick = () => { tr.remove(); renumberSets(div); };
        tbody.appendChild(tr);
      };
      div.querySelectorAll('.remove-set').forEach(btn => {
        btn.onclick = () => { btn.closest('tr').remove(); renumberSets(div); };
      });
      document.getElementById('exerciseList').appendChild(div);
    }

    function renumberSets(div) {
      div.querySelectorAll('tbody tr').forEach((tr, i) => { tr.cells[0].textContent = i + 1; });
    }

    document.getElementById('addExoBtn').onclick = () => addExerciseBlock();

    document.getElementById('saveSessionBtn').onclick = async () => {
      const date = document.getElementById('sessionDate').value;
      const name = document.getElementById('sessionName').value.trim();
      if (!date || !name) return alert('Remplis la date et le nom de la séance');
      const exercises = [];
      document.querySelectorAll('.exercise-block').forEach(block => {
        const exName = block.querySelector('.exo-name').value.trim();
        if (!exName) return;
        const sets = [];
        block.querySelectorAll('tbody tr').forEach(tr => {
          const reps = tr.querySelector('.set-reps').value;
          const weight = tr.querySelector('.set-weight').value;
          if (reps || weight) sets.push({ reps: reps || 0, weight: weight || 0 });
        });
        exercises.push({ name: exName, sets });
      });
      const body = { date, name, exercises };
      if (editingSessionId) {
        await fetch('/api/sessions/' + editingSessionId, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      } else {
        await fetch('/api/sessions', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      }
      document.getElementById('sessionModal').classList.remove('open');
      await loadSessions();
    };

    document.getElementById('deleteSessionBtn').onclick = async () => {
      if (!editingSessionId || !confirm('Supprimer cette séance ?')) return;
      await fetch('/api/sessions/' + editingSessionId, { method: 'DELETE' });
      document.getElementById('sessionModal').classList.remove('open');
      await loadSessions();
    };

    // --- TOP PERF ---
    async function loadPerfs() {
      const res = await fetch('/api/top-perfs');
      const perfs = await res.json();
      const list = document.getElementById('perfList');
      const empty = document.getElementById('perfEmpty');
      list.innerHTML = '';
      empty.style.display = perfs.length === 0 ? 'block' : 'none';
      perfs.forEach(p => {
        const div = document.createElement('div');
        div.className = 'perf-card';
        div.innerHTML = `
          <div>
            <div class="perf-exo">${escapeHtml(p.exercise)}</div>
            <div class="perf-detail">${frDate(p.date)} · ${escapeHtml(p.sessionName)}</div>
          </div>
          <div class="perf-value">${p.weight} kg × ${p.reps}</div>
        `;
        div.onclick = () => showSessionDetail(p.sessionId);
        list.appendChild(div);
      });
    }

    async function showSessionDetail(id) {
      const res = await fetch('/api/sessions/' + id);
      if (!res.ok) return alert('Séance introuvable');
      const s = await res.json();
      document.getElementById('detailTitle').textContent = s.name;
      document.getElementById('detailDate').textContent = frDate(s.date);
      const container = document.getElementById('detailExercises');
      container.innerHTML = '';
      s.exercises.forEach(ex => {
        const div = document.createElement('div');
        div.className = 'session-detail-exo';
        div.innerHTML = `<h4>${escapeHtml(ex.name)}</h4>
          <table><thead><tr><th>Série</th><th>Reps</th><th>Poids</th></tr></thead>
          <tbody>${ex.sets.map((set, i) => `<tr><td>${i+1}</td><td>${set.reps}</td><td>${set.weight} kg</td></tr>`).join('')}</tbody></table>`;
        container.appendChild(div);
      });
      document.getElementById('detailModal').classList.add('open');
    }

    document.getElementById('closeDetailBtn').onclick = () => document.getElementById('detailModal').classList.remove('open');

    // --- TASKS (existant) ---
    const taskInput = document.getElementById('taskInput');
    const taskList = document.getElementById('taskList');
    const taskEmpty = document.getElementById('taskEmpty');

    async function loadTaskList() {
      const res = await fetch('/api/tasks');
      const tasks = await res.json();
      renderTaskList(tasks);
    }

    function renderTaskList(tasks) {
      taskList.innerHTML = '';
      taskEmpty.style.display = tasks.length === 0 ? 'block' : 'none';
      tasks.forEach((task, index) => {
        const li = document.createElement('li');
        li.style.cssText = 'display:flex;justify-content:space-between;align-items:center;background:#16213e;padding:14px 16px;border-radius:8px;margin-bottom:8px;';
        const span = document.createElement('span');
        span.textContent = task;
        span.style.wordBreak = 'break-word';
        const btn = document.createElement('button');
        btn.className = 'btn btn-danger btn-sm';
        btn.textContent = '🗑️';
        btn.onclick = async () => {
          const r = await fetch('/api/tasks/' + index, { method: 'DELETE' });
          if (r.ok) { const d = await r.json(); renderTaskList(d.tasks); }
        };
        li.appendChild(span);
        li.appendChild(btn);
        taskList.appendChild(li);
      });
    }

    document.getElementById('addTaskBtn').onclick = async () => {
      const task = taskInput.value.trim();
      if (!task) return;
      const r = await fetch('/api/tasks', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ task }) });
      if (r.ok) { const d = await r.json(); renderTaskList(d.tasks); taskInput.value = ''; }
    };
    taskInput.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('addTaskBtn').click(); });

    // --- ESCAPE HTML ---
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // --- LOAD ---
    async function loadSessions() {
      const res = await fetch('/api/sessions');
      sessions = await res.json();
      renderWeek();
    }

    loadSessions();
    loadTaskList();
    setInterval(loadSessions, 5000);
    setInterval(loadTaskList, 5000);

    // --- REST TIMER (timestamp-based, works across tab switches) ---
    let timerDuration = 90;
    let timerEndTime = null; // timestamp quand le timer finit
    let timerPausedRemaining = 90; // secondes restantes en pause
    let timerRunning = false;
    let timerAnimFrame = null;
    let timerAlerted = false;
    const CIRCUMFERENCE = 2 * Math.PI * 110;
    const timerProgress = document.getElementById('timerProgress');
    const timerDisplay = document.getElementById('timerDisplay');
    const timerStartBtn = document.getElementById('timerStartBtn');
    const timerResetBtn = document.getElementById('timerResetBtn');

    timerProgress.setAttribute('stroke-dasharray', CIRCUMFERENCE);
    timerProgress.setAttribute('stroke-dashoffset', '0');

    function formatTimer(sec) {
      if (sec <= 0) return "0s";
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return m > 0 ? `${m}:${s.toString().padStart(2, '0')}` : `${s}s`;
    }

    function getTimerRemaining() {
      if (!timerRunning) return timerPausedRemaining;
      return Math.max(0, Math.ceil((timerEndTime - Date.now()) / 1000));
    }

    function updateTimerUI() {
      const remaining = getTimerRemaining();
      if (remaining <= 0 && timerRunning) {
        timerRunning = false;
        timerPausedRemaining = 0;
        timerStartBtn.textContent = 'Démarrer';
        timerDisplay.textContent = "C'est parti !";
        const pct = 1;
        timerProgress.setAttribute('stroke-dashoffset', (pct * CIRCUMFERENCE).toString());
        if (!timerAlerted) {
          timerAlerted = true;
          if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
          try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            osc.type = 'square';
            osc.frequency.value = 880;
            osc.connect(ctx.destination);
            osc.start();
            setTimeout(() => { osc.stop(); ctx.close(); }, 500);
          } catch(e) {}
        }
        return;
      }
      timerDisplay.textContent = formatTimer(remaining);
      const pct = 1 - (remaining / timerDuration);
      timerProgress.setAttribute('stroke-dashoffset', (pct * CIRCUMFERENCE).toString());
    }

    function timerTick() {
      updateTimerUI();
      if (timerRunning) {
        timerAnimFrame = requestAnimationFrame(timerTick);
      }
    }

    // Aussi mettre à jour quand on revient sur l'onglet
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && timerRunning) updateTimerUI();
    });

    function startTimer() {
      if (timerRunning) {
        // Pause
        timerPausedRemaining = getTimerRemaining();
        timerRunning = false;
        cancelAnimationFrame(timerAnimFrame);
        timerStartBtn.textContent = 'Reprendre';
        updateTimerUI();
        return;
      }
      if (timerPausedRemaining <= 0) {
        timerPausedRemaining = timerDuration;
      }
      timerAlerted = false;
      timerEndTime = Date.now() + timerPausedRemaining * 1000;
      timerRunning = true;
      timerStartBtn.textContent = 'Pause';
      timerTick();
    }

    function resetTimer() {
      cancelAnimationFrame(timerAnimFrame);
      timerRunning = false;
      timerPausedRemaining = timerDuration;
      timerStartBtn.textContent = 'Démarrer';
      timerAlerted = false;
      updateTimerUI();
    }

    function setTimerDuration(sec) {
      cancelAnimationFrame(timerAnimFrame);
      timerDuration = sec;
      timerPausedRemaining = sec;
      timerRunning = false;
      timerAlerted = false;
      timerStartBtn.textContent = 'Démarrer';
      updateTimerUI();
    }

    timerStartBtn.onclick = startTimer;
    timerResetBtn.onclick = resetTimer;

    document.querySelectorAll('.timer-presets button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.timer-presets button').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        setTimerDuration(parseInt(btn.dataset.time));
      });
    });

    document.getElementById('setCustomTime').onclick = () => {
      const val = parseInt(document.getElementById('customTime').value);
      if (val > 0 && val <= 3600) {
        document.querySelectorAll('.timer-presets button').forEach(b => b.classList.remove('selected'));
        setTimerDuration(val);
      }
    };

    updateTimerUI();

    // --- SAVED REST TIMES ---
    let savedRestTimes = JSON.parse(localStorage.getItem('moggtrack_rest') || '[]');

    function renderSavedRest() {
      const list = document.getElementById('savedRestList');
      const empty = document.getElementById('srEmpty');
      list.innerHTML = '';
      empty.style.display = savedRestTimes.length === 0 ? 'block' : 'none';
      savedRestTimes.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'saved-rest-item';
        div.innerHTML = `
          <span class="sr-name">${escapeHtml(item.name)}</span>
          <span class="sr-time">${formatTimer(item.time)}</span>
          <button class="btn btn-danger btn-sm">✕</button>
        `;
        div.querySelector('.sr-name').onclick = () => {
          document.querySelectorAll('.timer-presets button').forEach(b => b.classList.remove('selected'));
          setTimerDuration(item.time);
        };
        div.querySelector('.sr-time').onclick = () => {
          document.querySelectorAll('.timer-presets button').forEach(b => b.classList.remove('selected'));
          setTimerDuration(item.time);
        };
        div.querySelector('button').onclick = (e) => {
          e.stopPropagation();
          savedRestTimes.splice(i, 1);
          localStorage.setItem('moggtrack_rest', JSON.stringify(savedRestTimes));
          renderSavedRest();
        };
        list.appendChild(div);
      });
    }

    document.getElementById('srAddBtn').onclick = () => {
      const name = document.getElementById('srName').value.trim();
      const time = parseInt(document.getElementById('srTime').value);
      if (!name || !time || time <= 0 || time > 3600) return;
      savedRestTimes.push({ name, time });
      localStorage.setItem('moggtrack_rest', JSON.stringify(savedRestTimes));
      document.getElementById('srName').value = '';
      document.getElementById('srTime').value = '';
      renderSavedRest();
    };

    renderSavedRest();
  </script>
</body>
</html>
